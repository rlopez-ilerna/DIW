<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejercicio 9 - Animación</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="script.js"></script>

<style>
    #contenedor {
        width: 400px;
        height: 200px;
        border: 2px solid black;
        position: relative;
        margin-bottom: 20px;
    }

    #cuadrado {
        width: 50px;
        height: 50px;
        background: blue;
        position: absolute;
        top: 0;
        left: 0;
    }
</style>
</head>
<body>

<div id="contenedor">
    <div id="cuadrado"></div>
</div>

<button id="mover">Mover</button>

</body>
</html>
